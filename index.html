<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">
        <label></label>
        <input type="text" id="display"><br>
        <button class="btn" id="i1">AC</button>
        <button class="btn" id="i2">DEL</button>
        <button class="btn" id="i3">/</button>
        <button class="btn" id="i4">÷</button><br><br>
        <button class="btn">7</button>
        <button class="btn">8</button>
        <button class="btn">9</button>
        <button class="btn" id="i6">*</button><br><br>
        <button class="btn">4</button>
        <button class="btn">5</button>
        <button class="btn">6</button>
        <button class="btn" id="i7">-</button><br><br>
        <button class="btn">1</button>
        <button class="btn">2</button>
        <button class="btn">3</button>
        <button class="btn" id="i8">+</button><br><br>
        <button class="btn">%</button>
        <button class="btn">0</button>
        <button class="btn">.</button>
        <button class="btn" id="i9">=</button>
    </div>

    <script>
let display = document.getElementById("display");
let buttons = document.querySelectorAll(".btn");

buttons.forEach(button => {
    button.addEventListener("click", () => {
        let value = button.innerText;

        if (value === "AC") {
            display.value = "";
        }
        else if (value === "DEL") {
            display.value = display.value.slice(0, -1);
        }
        else if (value === "=") {
            try {
                let expression = display.value
                    .replace("x", "*")
                    .replace("÷", "/");

                display.value = eval(expression);
            }
            catch {
                display.value = "Error";
            }
        }
        else {
            display.value += value;
        }
    });
});
</script>
</body>
</html>
